name: medical_app
description: Medical Records Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_auth: ^5.4.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  image_picker: ^1.1.2
  pdf: ^3.10.8
  printing: ^5.12.0
