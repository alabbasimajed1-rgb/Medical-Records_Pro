name: medical_app
description: Medical Records Application for managing patients and visits.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_auth: ^5.3.0

  # الترجمة واللغات
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # التقاط الصور
  image_picker: ^1.1.2

  # إنشاء ومشاركة PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # حفظ الملفات المؤقتة
  path_provider: ^2.1.3

  # Google Sign-In و Drive (للاستخدام المستقبلي)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0

  # إشعارات سريعة
  fluttertoast: ^8.2.4

  # أيقونات إضافية
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  # الخطوط العربية
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

  # صور وأصول التطبيق
  assets:
    - assets/images/
    - assets/icons/
